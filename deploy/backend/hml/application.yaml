spring:
  profiles:
    active: hml
  mvc:
    cors:
      mappings:
        "[/**]":
          allowed-origins: "http://hml.orcamento.local,http://api.hml.orcamento.local,http://localhost:8080,*"
          allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
          allowed-headers: "*"
          exposed-headers: "*"
          allow-credentials: true
          max-age: 3600
  application:
    name: orcamento
  output:
    ansi:
      enabled: NEVER
  devtools:
    restart:
      enabled: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql-external.orcamento.svc.cluster.local:3306/orcamento-hml?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: HikariPool-Orcamento
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  jackson:
    date-format: yyyy-MM-dd
    time-zone: UTC
    deserialization:
      ADJUST_DATES_TO_CONTEXT_TIME_ZONE: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: noreplay.meuorcamento@gmail.com
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: noreplay.meuorcamento@gmail.com

server:
  port: 8045

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    org.springframework.security: INFO

jwt:
  secret: ${JWT_SECRET:}
  expiration:
    ms: 1800000

file:
  upload-dir: ./uploads

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  cors:
    allowed-origin-patterns:
      - http://hml.orcamento.local
      - http://api.hml.orcamento.local
      - http://localhost:*
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      - PATCH
    allowed-headers:
      - "*"
    exposed-headers:
      - Authorization
      - Content-Disposition
    allow-credentials: false
    max-age: 3600
