spring:
  application:
    name: orcamento
  profiles:
    default: dev
  devtools:
    restart:
      enabled: false
  jackson:
    date-format: yyyy-MM-dd
    time-zone: UTC
    deserialization:
      ADJUST_DATES_TO_CONTEXT_TIME_ZONE: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  jpa:
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8045}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    org.springframework.security: INFO

jwt:
  secret: ${JWT_SECRET:Jm9eL/WB+KdOdPMFqg6XjQlvFZHYck1/b6+zp9h9x8A=}
  expiration:
    ms: ${JWT_EXPIRATION_MS:1800000}
  refresh:
    expiration:
      ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

notificacoes:
  despesas:
    enabled: ${NOTIFICACOES_DESPESAS_ENABLED:true}
    dias-antecedencia: ${NOTIFICACOES_DESPESAS_DIAS_ANTECEDENCIA:7}
    cron: ${NOTIFICACOES_DESPESAS_CRON:0 0 12 * * *}

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  cors:
    allowed-origin-patterns:
      - http://orcamento.local
      - http://localhost:*
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      - PATCH
    allowed-headers:
      - "*"
    exposed-headers:
      - Authorization
      - Content-Disposition
    allow-credentials: false
    max-age: 3600
  fechamento-mensal:
    validar-fechamento-diario-desde: ${FECHAMENTO_MENSAL_VALIDAR_FECHAMENTO_DIARIO_DESDE:2026-03}
  bootstrap:
    admin:
      enabled: false
      username:
      email:
      nome:
      tenant-id:
      password-hash:
