spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:orcamento-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd
    time-zone: UTC
    deserialization:
      ADJUST_DATES_TO_CONTEXT_TIME_ZONE: false
  mail:
    host: localhost
    port: 2525
    username: test
    password: test
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: Jm9eL/WB+KdOdPMFqg6XjQlvFZHYck1/b6+zp9h9x8A=
  expiration:
    ms: 1800000
  refresh:
    expiration:
      ms: 604800000

file:
  upload-dir: ./target/test-uploads

management:
  health:
    mail:
      enabled: false
